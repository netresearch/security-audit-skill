    desc: "Cloud Functions environment variable contains hardcoded secret"

  - id: SA-GCP-07
    type: regex_not
    target: "**/*.{tf,json,yaml,yml}"
    pattern: "cloudfunctions\\.invoker[^}]*allUsers|allUsers[^}]*cloudfunctions\\.invoker"
    severity: error

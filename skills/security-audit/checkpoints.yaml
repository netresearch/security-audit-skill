  - id: SA-GIN-04
    type: regex_not
    target: "**/*.go"
    pattern: "AllowAllOrigins\\s*:\\s*true|AllowOrigins\\s*:\\s*\\[\\s*\"\\*\"\\s*\\]|AllowOriginFunc\\s*:.*return\\s+true"
    severity: error
    desc: "CORS misconfiguration — wildcard or permissive origin policy"

  - id: SA-GIN-05
    type: regex_not

  - id: SA-AZURE-03
    type: regex_not
    target: "**/*.{tf,json,bicep,yaml,yml}"
    pattern: "allow_nested_items_to_be_public\\s*=\\s*true|allow_blob_public_access\\s*=\\s*true|allowBlobPublicAccess['\"]?\\s*[:=]\\s*['\"]?true|container_access_type\\s*=\\s*\"(blob|container)\""

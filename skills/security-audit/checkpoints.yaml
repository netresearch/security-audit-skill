  - id: SA-AZURE-05
    type: regex_not
    target: "**/*.{tf,json,bicep,yaml,yml}"
    pattern: "app_settings\\s*=\\s*\\{[^}]*(PASSWORD|SECRET|KEY|TOKEN|CONNECTION)\\s*=\\s*\"(?!@Microsoft\\.KeyVault)[^\"]+\""

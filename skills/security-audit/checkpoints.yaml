    pattern: "gin\\.New\\s*\\(\\s*\\)"
    severity: warning
    desc: "gin.New() without default middleware — verify Recovery() is registered first"

  # === RAILS SECURITY CHECKS ===
  - id: SA-RAILS-01
    type: regex_not
    target: "**/*.rb"
    pattern: "\\.permit!|params\\[:[a-z_]+\\]\\.permit\\([^)]*(?:role|admin|superuser|permission)"

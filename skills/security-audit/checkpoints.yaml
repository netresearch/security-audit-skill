  - id: SA-GCP-06
    type: regex_not
    target: "**/*.{tf,json,yaml,yml}"
    pattern: "environment_variables\\s*=\\s*\\{[^}]*(PASSWORD|SECRET|API_KEY|TOKEN|PRIVATE_KEY)\\s*=\\s*\"[^\"]+\""

  - id: SA-AZURE-10
    type: regex_not
    target: "**/*.{tf,json,bicep,yaml,yml}"
    pattern: "public_network_access_enabled\\s*=\\s*true|start_ip_address\\s*=\\s*\"0\\.0\\.0\\.0\""

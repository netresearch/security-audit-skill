    desc: "Key Vault missing purge protection — keys can be permanently deleted"

  - id: SA-AZURE-08
    type: regex_not
    target: "**/*.{tf,json,bicep,yaml,yml}"
    pattern: "enable_rbac_authorization\\s*=\\s*false|access_policy\\s*\\{"

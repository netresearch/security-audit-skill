  - id: SA-GCP-03
    type: regex_not
    target: "**/*.{tf,json,yaml,yml}"
    pattern: "\"allUsers\"|\"allAuthenticatedUsers\"|member\\s*=\\s*\"allUsers\"|member\\s*=\\s*\"allAuthenticatedUsers\""
